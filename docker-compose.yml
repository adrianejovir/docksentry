services:
  docksentry:
    build: .
    image: adrianejovir/docksentry:latest
    container_name: docksentry
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 18 * * *}
      - EXCLUDE_CONTAINERS=${EXCLUDE_CONTAINERS:-}
      - AUTO_SELFUPDATE=${AUTO_SELFUPDATE:-false}
      - LANGUAGE=${LANGUAGE:-en}
      - TZ=${TZ:-Asia/Manila}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WEB_UI=${WEB_UI:-true}
      - WEB_PORT=${WEB_PORT:-1234}
      - WEB_PASSWORD=${WEB_PASSWORD:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - docksentry_data:/data
      # Docker credentials (for authenticated pulls, avoids rate limits)
      - ${DOCKER_CONFIG:-/root/.docker/config.json}:/.docker/config.json:ro
      # Compose project directories (needed to restart containers)
      - ${COMPOSE_DIR:-/data/compose}:/data/compose
    security_opt:
      - no-new-privileges:true
    ports:
      - "${WEB_PORT:-1234}:1234"

volumes:
  docksentry_data: